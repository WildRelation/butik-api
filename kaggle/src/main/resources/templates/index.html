<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head>
    <meta charset="UTF-8">
    <title>DuckLake Datasets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .hero { background: #20232a; color: white; padding: 48px 0 36px; margin-bottom: 36px; }
        .hero h1 { font-size: 2.4rem; font-weight: 700; }
        .hero p  { color: #adb5bd; }
        .dataset-card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                        transition: transform .15s, box-shadow .15s; cursor: pointer; }
        .dataset-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .badge-inbyggd   { background: #0d6efd; }
        .badge-uppladdad { background: #198754; }
        .search-bar { max-width: 500px; }
    </style>
</head>
<body>

<div class="hero">
    <div class="container">
        <h1>🦆 DuckLake Datasets</h1>
        <p>Utforska och ladda upp datasets lagrade i DuckLake (Parquet-format)</p>
        <form method="get" action="/" class="d-flex gap-2 search-bar mt-3">
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Sök dataset...">
            <button class="btn btn-primary">Sök</button>
        </form>
    </div>
</div>

<div class="container pb-5">

    <div th:if="${fel}" class="alert alert-danger" th:text="${fel}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0" th:text="${datasets != null ? datasets.size() + ' datasets' : ''}"></h5>
        <a href="/upload" class="btn btn-success">+ Ladda upp dataset</a>
    </div>

    <div class="row g-4" th:if="${datasets != null}">
        <div class="col-md-4" th:each="ds : ${datasets}">
            <a th:href="@{/dataset/{n}(n=${ds.namn})}" class="text-decoration-none text-dark">
                <div class="card dataset-card h-100 p-3">
                    <div class="card-body">
                        <div class="mb-2">
                            <span class="badge"
                                  th:classappend="${ds.kalla == 'inbyggd'} ? 'badge-inbyggd' : 'badge-uppladdad'"
                                  th:text="${ds.kalla}"></span>
                        </div>
                        <h5 class="card-title" th:text="${ds.namn}"></h5>
                        <p class="card-text text-muted small" th:text="${ds.beskrivning}"></p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div th:if="${datasets != null and datasets.size() == 0}" class="text-center text-muted py-5">
        <p>Inga datasets matchade din sökning.</p>
    </div>

</div>
</body>
</html>
