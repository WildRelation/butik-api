<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head>
    <meta charset="UTF-8">
    <title th:text="${dataset != null ? dataset.namn : 'Dataset'}">Dataset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .header-bar { background: #20232a; color: white; padding: 32px 0; margin-bottom: 32px; }
        table { font-size: 0.9rem; }
        th { background: #20232a; color: white; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="container">
        <a href="/" class="text-white text-decoration-none small">← Alla datasets</a>
        <h1 class="mt-2 mb-1" th:text="${dataset != null ? dataset.namn : ''}"></h1>
        <span class="text-muted" th:if="${dataset != null}"
              th:text="${dataset.antalRader + ' rader · ' + dataset.kolumner.size() + ' kolumner'}"></span>
    </div>
</div>

<div class="container pb-5">

    <div th:if="${fel}" class="alert alert-danger" th:text="${fel}"></div>

    <div th:if="${dataset != null}">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th th:each="kol : ${dataset.kolumner}" th:text="${kol}"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="rad : ${dataset.data}">
                                <td th:each="kol : ${dataset.kolumner}"
                                    th:text="${rad[kol]}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <p class="text-muted small mt-2">Visar upp till 100 rader.</p>
    </div>

</div>
</body>
</html>
